<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<title>오버레이 색상 긴급수정 — 초록/파랑=패널추천·빨강=급락만 · board_demo</title>
<style>
  body{background:#0f172a;color:#e2e8f0;font:14px/1.5 -apple-system,'Malgun Gothic',sans-serif;padding:20px}
  h1{font-size:17px} h2{font-size:14px;color:#7dd3fc;margin:16px 0 4px} h3{font-size:13px;margin:10px 0 4px}
  .rule{color:#9fb3c8;font-size:13px;margin-bottom:8px}
  .wrap{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
  table{border-collapse:collapse;margin:4px 0}
  td,th{border:1px solid #2b3648;width:44px;height:34px;text-align:center;font-weight:700;position:relative;font-size:11px}
  th{background:#1e293b;font-size:13px}
  .green{background:rgba(34,197,94,.20);border:3px solid #22c55e}
  .blue{background:rgba(59,130,246,.18);border:3px solid #3b82f6}
  .red{background:rgba(239,68,68,.22);border:3px solid #ef4444}
  .pass{color:#22c55e;font-weight:800} .fail{color:#ef4444;font-weight:800}
  .summary{margin:4px 0;font-size:12.5px}
  .panel{min-width:210px;background:#141c2b;border:1px solid #334155;border-radius:10px;padding:10px 12px}
</style></head>
<body>
<h1>🎯 오버레이 색상 긴급수정 — 초록/파랑=패널추천 · 빨강=급락만 — board_demo</h1>
<div class="rule">우선순위 <b>초록 &gt; 파랑 &gt; 빨강</b>. 초록/파랑=패널 finalQuinellas(비면 confQuinellas 폴백). <b>빨강=실제 급락(dropMap) 셀만</b>(추천 아닌 셀). 나머지 완전 투명.</div>
<div id="out"></div>
<script>
function ck(a,b){return Math.min(a,b)+'|'+Math.max(a,b);}
// overlay.js 와 동일한 캡·로직 재현
function caps(sport,n){var s=(sport==='cycle'||sport==='boat'||sport==='bike');if(s)return{greenMax:1,blueMax:3};if(n<=9)return{greenMax:1,blueMax:3};if(n===10)return{greenMax:1,blueMax:4};if(n<=12)return{greenMax:2,blueMax:4};return{greenMax:2,blueMax:6};}
var scenes=[
 // ★ 사용자 케이스: 패널 추천 1+5(3.1배)·1+7(18.5배), finalQuinellas 비어서 confQuinellas 폴백. 급락은 6-8 하나만.
 {title:'🐎 경마 8두 — 메인 비어 confQuinellas 폴백(1+5·1+7) + 급락 6-8만 빨강', sport:'horse', n:8,
   finalQuinellas:[], confQuinellas:[{combo:[1,5],odds:3.1},{combo:[1,7],odds:18.5}],
   dropMap:{'6|8':-27}, // 실제 급락 조합 1개만
   warnManyCells:['2|3','2|4','3|4','4|6','2|6','3|6'] },  // 예전이면 이들이 warnHorse로 빨강이었음(이제 투명)
 // 정상 케이스: finalQuinellas 있음 + 급락 2-7
 {title:'🚴 경륜 7두 — finalQuinellas(3+4·2+4·4+6) + 급락 2-7만 빨강', sport:'cycle', n:7,
   finalQuinellas:[{combo:[3,4],odds:2.8,stars:3},{combo:[2,4],odds:6.1,stars:2},{combo:[4,6],odds:8.2,stars:2}],
   confQuinellas:[], dropMap:{'2|7':-33}, warnManyCells:['1|5','5|6','1|6'] },
];
var out=document.getElementById('out');
scenes.forEach(function(s){
  var c=caps(s.sport,s.n);
  // green/blue 소스 = finalQuinellas, 비면 confQuinellas 폴백(overlay.js 동일)
  var fq=s.finalQuinellas.slice();
  if(!fq.length && s.confQuinellas.length) fq=s.confQuinellas.slice(0,2);
  var greenSet={},blueSet={},gN=0,bN=0;
  fq.forEach(function(q){var k=ck(q.combo[0],q.combo[1]);if(greenSet[k]||blueSet[k])return;if(gN<c.greenMax){greenSet[k]=1;gN++;return;}if(bN<c.blueMax){blueSet[k]=1;bN++;}});
  // red = dropMap 셀만(초록/파랑 제외)
  var redSet={};Object.keys(s.dropMap).forEach(function(k){if(greenSet[k]||blueSet[k])return;redSet[k]=1;});
  var nums=[];for(var i=1;i<=s.n;i++)nums.push(i);
  var html='<h2>'+s.title+'</h2><div class="wrap"><div><h3>배당판 오버레이</h3><table><tr><th>마</th>';
  nums.forEach(function(x){html+='<th>'+x+'</th>';});html+='</tr>';
  nums.forEach(function(r){html+='<tr><th>'+r+'</th>';nums.forEach(function(col){if(col===r){html+='<td style="background:#1e293b">·</td>';return;}var k=ck(r,col);var cls=greenSet[k]?'green':(blueSet[k]?'blue':(redSet[k]?'red':''));var mk=cls==='green'?'🔒':(cls==='red'?'▼':'');html+='<td class="'+cls+'">'+mk+'</td>';});html+='</tr>';});
  html+='</table></div>';
  html+='<div class="panel"><h3 style="margin-top:0">패널 추천</h3>'+fq.map(function(q,i){return '<div>복승: <b>'+q.combo[0]+'+'+q.combo[1]+'</b> ('+q.odds+'배) → '+(i<c.greenMax?'<span style="color:#22c55e">초록</span>':'<span style="color:#3b82f6">파랑</span>')+'</div>';}).join('')+'</div></div>';
  // 검증: 패널 조합 전부 초록/파랑, 빨강=dropMap 개수, warn 셀들은 투명
  var panelKeys=fq.map(function(q){return ck(q.combo[0],q.combo[1]);});
  var allEmph=panelKeys.every(function(k){return greenSet[k]||blueSet[k];});
  var redOnlyDrops=Object.keys(redSet).every(function(k){return s.dropMap[k]!=null;});
  var warnClean=s.warnManyCells.every(function(k){return !redSet[k];});
  var ok=allEmph&&redOnlyDrops&&warnClean&&Object.keys(greenSet).length>=1;
  html+='<div class="summary">패널 조합 전부 강조 '+(allEmph?'✓':'✗')+' · 빨강=급락만('+Object.keys(redSet).length+'개) '+(redOnlyDrops?'✓':'✗')+' · 옛 warn셀 투명 '+(warnClean?'✓':'✗')+' → <span class="'+(ok?'pass':'fail')+'">'+(ok?'PASS':'FAIL')+'</span></div>';
  out.innerHTML+=html;
});
</script>
</body></html>
