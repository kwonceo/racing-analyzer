<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏇 경마 분석 서버 v2.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh}
.topbar{background:#1a1a18;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
.topbar h1{font-size:16px;font-weight:500;flex:1}
.api-row{display:flex;align-items:center;gap:8px}
.api-row input{padding:6px 10px;border:1px solid #444;border-radius:6px;background:#333;color:#fff;font-size:12px;width:280px}
.dot{width:9px;height:9px;border-radius:50%;background:#555;flex-shrink:0}
.dot.green{background:#22c55e}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#1a1a18;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#f0f0e8}
.btn-blue{background:#2a78d6;color:#fff;border-color:#2a78d6}
.btn-blue:hover{background:#1d65b8}
.btn-sm{padding:5px 10px;font-size:12px}
.main{display:grid;grid-template-columns:300px 1fr;gap:0;height:calc(100vh - 48px)}
.sidebar{background:#fff;border-right:1px solid #e1e0d8;overflow-y:auto;padding:16px}
.content{overflow-y:auto;padding:20px}
.section{margin-bottom:18px}
.section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.upload-zone{border:2px dashed #ddd;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:.15s;background:#fafaf8}
.upload-zone:hover,.upload-zone.drag{border-color:#2a78d6;background:#EBF4FF}
.upload-zone input{display:none}
.upload-icon{font-size:28px;margin-bottom:6px}
.upload-text{font-size:13px;color:#888}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500}
.badge-blue{background:#E6F1FB;color:#0C447C}
.badge-green{background:#EAF3DE;color:#27500A}
.badge-amber{background:#FAEEDA;color:#633806}
.badge-red{background:#FCEBEB;color:#791F1F}
.info-box{background:#f8f8f4;border-radius:8px;padding:10px 12px;font-size:12px;color:#666;margin-bottom:10px}
.info-box b{color:#1a1a18}
.race-chip{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:8px;border:1px solid #e1e0d8;margin-bottom:6px;cursor:pointer;transition:.15s;background:#fff}
.race-chip:hover{border-color:#2a78d6;background:#EBF4FF}
.race-chip.active{border-color:#2a78d6;background:#EBF4FF}
.race-chip.done{border-color:#22c55e;background:#F0FDF4}
.race-num{width:28px;height:28px;border-radius:6px;background:#1a1a18;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.race-num.seoul{background:#0C447C}
.race-num.busan{background:#633806}
.race-info{flex:1;min-width:0}
.race-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.race-meta{font-size:11px;color:#888;margin-top:1px}
.chip-icon{font-size:14px;flex-shrink:0}
.card{background:#fff;border:1px solid #e1e0d8;border-radius:12px;padding:18px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.horses-table{width:100%;border-collapse:collapse;font-size:13px}
.horses-table th{font-size:11px;color:#aaa;text-align:left;padding:5px 8px;border-bottom:1px solid #eee}
.horses-table td{padding:7px 8px;border-bottom:1px solid #f5f5f0}
.horses-table tr:last-child td{border:none}
.grade-box{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.grade-card{border-radius:9px;padding:12px 14px}
.grade-A{background:#E6F1FB;border:1px solid #B5D4F4}
.grade-B{background:#EAF3DE;border:1px solid #C0DD97}
.grade-C{background:#FAEEDA;border:1px solid #FAC775}
.grade-D{background:#FCEBEB;border:1px solid #F09595}
.grade-label{font-size:10px;font-weight:700;color:#888;margin-bottom:4px}
.grade-horse{font-size:16px;font-weight:600}
.grade-reason{font-size:11px;color:#666;margin-top:4px;line-height:1.4}
.bet-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f0;font-size:13px}
.bet-row:last-child{border:none}
.analysis-text{font-size:13px;line-height:1.7;color:#444}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:8px;line-height:1.5}
.alert-y{background:#FAEEDA;border:1px solid #FAC775;color:#633806}
.alert-g{background:#EAF3DE;border:1px solid #C0DD97;color:#27500A}
.alert-b{background:#E6F1FB;border:1px solid #B5D4F4;color:#0C447C}
.progress-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:#2a78d6;border-radius:3px;transition:width .3s}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #eee;border-top-color:#2a78d6;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}
.empty-icon{font-size:48px;margin-bottom:12px}
.tab-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#888;font-family:inherit;transition:.15s}
.tab-btn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.analyze-btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 7px;border-radius:5px;display:inline-block;font-weight:500}
.tag-b{background:#E6F1FB;color:#0C447C}
.tag-g{background:#EAF3DE;color:#27500A}
.tag-r{background:#FCEBEB;color:#791F1F}
.tag-a{background:#FAEEDA;color:#633806}
</style>
</head>
<body>

<div class="topbar">
  <span style="font-size:20px">🏇</span>
  <h1>경마 분석 서버 v2.0</h1>
  <div class="api-row">
    <div class="dot" id="api-dot"></div>
    <input type="password" id="api-key" placeholder="Anthropic API 키 입력" oninput="saveKey()">
    <button class="btn btn-sm" onclick="testKey()" style="color:#fff;background:#333;border-color:#555">저장</button>
  </div>
</div>

<div class="main">
<!-- ===== 사이드바 ===== -->
<div class="sidebar">

  <div class="section">
    <div class="section-title">📄 PDF 업로드</div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('pdf-input').click()"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <input type="file" id="pdf-input" accept=".pdf" onchange="uploadPDF(this.files[0])">
      <div class="upload-icon">📂</div>
      <div class="upload-text" id="upload-text">클릭 또는 드래그하여 PDF 업로드</div>
    </div>
  </div>

  <div class="section" id="structure-section" style="display:none">
    <div class="section-title">📊 감지된 구조</div>
    <div class="info-box" id="structure-info"></div>

    <div class="section-title" style="margin-top:14px">🗂️ 필터</div>
    <div class="tab-row" id="venue-tabs">
      <button class="tab-btn active" onclick="filterVenue('all',this)">전체</button>
      <button class="tab-btn" onclick="filterVenue('서울경마',this)">서울</button>
      <button class="tab-btn" onclick="filterVenue('부산경마',this)">부산</button>
    </div>

    <div class="section-title">🏁 경주 목록</div>
    <div id="race-list"></div>

    <div class="analyze-btn-row">
      <button class="btn btn-blue" onclick="analyzeAll()">⚡ 전체 분석</button>
      <button class="btn" onclick="resetResults()">🔄 초기화</button>
    </div>
  </div>

</div>

<!-- ===== 메인 컨텐츠 ===== -->
<div class="content" id="main-content">
  <div class="empty">
    <div class="empty-icon">🐎</div>
    <div>PDF를 업로드하면<br>경주 목록이 자동으로 감지됩니다</div>
  </div>
</div>
</div>

<script>
let sessionFile = '';
let allRaces = [];
let jockeyPages = [];
let results = {};
let currentVenue = 'all';

// ─── API 키 관리 ───
function saveKey() {
  const key = document.getElementById('api-key').value.trim();
  localStorage.setItem('anthropic_key', key);
  document.getElementById('api-dot').className = 'dot ' + (key.startsWith('sk-') ? 'green' : '');
}
function testKey() {
  const key = document.getElementById('api-key').value.trim();
  document.getElementById('api-dot').className = 'dot ' + (key.startsWith('sk-') ? 'green' : '');
  localStorage.setItem('anthropic_key', key);
  alert(key.startsWith('sk-') ? '✅ API 키 저장됨' : '❌ 키 형식 확인 (sk- 로 시작해야 함)');
}
window.onload = () => {
  const saved = localStorage.getItem('anthropic_key') || '';
  if (saved) {
    document.getElementById('api-key').value = saved;
    document.getElementById('api-dot').className = 'dot ' + (saved.startsWith('sk-') ? 'green' : '');
  }
};

// ─── 파일 드롭 ───
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.pdf')) uploadPDF(file);
}

// ─── PDF 업로드 ───
async function uploadPDF(file) {
  if (!file) return;
  const uz = document.getElementById('upload-zone');
  document.getElementById('upload-text').textContent = '⏳ 분석 중...';
  uz.style.pointerEvents = 'none';

  const fd = new FormData();
  fd.append('pdf', file);

  try {
    const res = await fetch('/api/upload', {method:'POST', body:fd});
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    sessionFile = data.session_file;
    jockeyPages = data.jockey_pages;
    allRaces = data.races;

    document.getElementById('upload-text').textContent = `✅ ${file.name} (${data.total_pages}페이지)`;
    document.getElementById('structure-section').style.display = 'block';

    document.getElementById('structure-info').innerHTML =
      `<b>총 ${data.total_pages}페이지</b> 감지<br>` +
      `경주: <b>${data.races.length}개</b> | ` +
      `기수현황: <b>${data.jockey_pages.join(', ')}p</b>`;

    renderRaceList();
  } catch(e) {
    document.getElementById('upload-text').textContent = '❌ 오류: ' + e.message;
  }
  uz.style.pointerEvents = '';
}

// ─── 경주 목록 렌더링 ───
function filterVenue(venue, el) {
  currentVenue = venue;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderRaceList();
}

function renderRaceList() {
  const filtered = currentVenue === 'all' ? allRaces : allRaces.filter(r=>r.venue===currentVenue);
  const c = document.getElementById('race-list');
  c.innerHTML = filtered.map(r => {
    const isDone = results[r.page] ? 'done' : '';
    const cls = r.venue.includes('서울') ? 'seoul' : 'busan';
    const icon = results[r.page] ? '✅' : '▶';
    return `<div class="race-chip ${isDone}" onclick="analyzeRace(${r.page},'${r.venue}',${r.no})">
      <div class="race-num ${cls}">${r.no}</div>
      <div class="race-info">
        <div class="race-name">${r.venue.replace('경마','')} ${r.no}경주</div>
        <div class="race-meta">${r.distance} · ${r.page}p</div>
      </div>
      <span class="chip-icon">${icon}</span>
    </div>`;
  }).join('');
}

// ─── 단일 경주 분석 ───
async function analyzeRace(page, venue, no) {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { alert('API 키를 먼저 입력하세요'); return; }
  if (!sessionFile) { alert('PDF를 먼저 업로드하세요'); return; }

  // 칩 활성화
  document.querySelectorAll('.race-chip').forEach(c=>c.classList.remove('active'));
  event.currentTarget.classList.add('active');

  showLoading(`${venue} ${no}경주 분석 중...`);

  try {
    const res = await fetch('/api/analyze', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({api_key:apiKey, session_file:sessionFile, race_page:page, jockey_pages:jockeyPages})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    results[page] = data;
    renderResult(data, venue, no);
    renderRaceList();
  } catch(e) {
    showError(e.message);
  }
}

// ─── 전체 분석 ───
async function analyzeAll() {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { alert('API 키를 먼저 입력하세요'); return; }
  if (!sessionFile) { alert('PDF를 먼저 업로드하세요'); return; }

  const filtered = currentVenue === 'all' ? allRaces : allRaces.filter(r=>r.venue===currentVenue);
  showLoading(`전체 ${filtered.length}경주 분석 중... (잠시 기다려주세요)`);

  try {
    const res = await fetch('/api/analyze_all', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        api_key:apiKey, session_file:sessionFile,
        race_pages: filtered,
        jockey_pages: jockeyPages
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    data.results.forEach(r => {
      if (r.status === 'ok') results[r.data.meta.page] = r.data;
    });
    renderAllResults(data.results);
    renderRaceList();
  } catch(e) {
    showError(e.message);
  }
}

function resetResults() {
  results = {};
  renderRaceList();
  document.getElementById('main-content').innerHTML = `<div class="empty"><div class="empty-icon">🔄</div><div>초기화 완료</div></div>`;
}

// ─── 로딩/에러 ───
function showLoading(msg) {
  document.getElementById('main-content').innerHTML =
    `<div class="loading"><div class="spinner"></div><div>${msg}</div></div>`;
}
function showError(msg) {
  document.getElementById('main-content').innerHTML =
    `<div class="card" style="border-color:#F09595"><div class="card-title">❌ 오류</div><div style="color:#791F1F;font-size:13px">${msg}</div></div>`;
}

// ─── 단일 경주 결과 렌더링 ───
function renderResult(data, venue, no) {
  const gp = data.grade_picks || {};
  const br = data.betting_recommend || {};
  const rd = data.race_data || {};
  const hdr = rd.header || {};

  const gradeHtml = ['A','B','C','D'].map(g => {
    const pick = gp[g];
    if (!pick) return '';
    const cls = {A:'grade-A',B:'grade-B',C:'grade-C',D:'grade-D'}[g];
    const lbl = {A:'A 유력마',B:'B 차순위',C:'C 복병마',D:'D 보험마'}[g];
    return `<div class="grade-card ${cls}">
      <div class="grade-label">${lbl}</div>
      <div class="grade-horse">${pick.no}번 ${pick.name}</div>
      <div class="grade-reason">${pick.reason}</div>
    </div>`;
  }).join('');

  const horsesHtml = (rd.horses||[]).map(h =>
    `<tr><td style="font-weight:500">${h.no}번</td><td>${h.name}</td><td>${h.jockey}</td><td style="text-align:right">${h.weight}kg</td></tr>`
  ).join('');

  const p2 = (data.pattern2_horses||[]).join(', ');
  const specialHtml = p2
    ? `<div class="alert alert-y">⚠️ <b>2착 패턴 감지:</b> ${p2} — 삼복승 필수 포함</div>`
    : `<div class="alert alert-g">✅ 특이 패턴 없음</div>`;

  const betHtml = [
    ...(br.win ? [`<div class="bet-row"><span><span class="tag tag-r">단승</span> ${br.win}</span><span class="badge badge-red">5%</span></div>`] : []),
    ...(br.quinella||[]).map((c,i) => `<div class="bet-row"><span><span class="tag tag-b">복승</span> ${c}</span><span class="badge badge-blue">${i===0?'40%':'18%'}</span></div>`),
    ...(br.trifecta||[]).map((c,i) => `<div class="bet-row"><span><span class="tag tag-g">삼복승</span> ${c}</span><span class="badge badge-green">${i===0?'27%':'8%'}</span></div>`),
  ].join('');

  document.getElementById('main-content').innerHTML = `
    <div class="card">
      <div class="card-title">🏇 ${venue} ${no}경주
        <span class="badge badge-blue">${hdr.distance||''}</span>
        <span class="badge badge-green">${hdr.start_time||''}</span>
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:10px">${hdr.conditions||''}</div>
      <div class="alert alert-b">📋 ${data.race_summary||''}</div>
    </div>

    <div class="card">
      <div class="card-title">🎯 등급 분류</div>
      <div class="grade-box">${gradeHtml}</div>
      ${specialHtml}
      ${data.special_notes ? `<div class="alert alert-y" style="margin-top:8px">📌 ${data.special_notes}</div>` : ''}
    </div>

    <div class="card">
      <div class="card-title">💰 베팅 추천</div>
      ${betHtml}
    </div>

    <div class="card">
      <div class="card-title">📊 종합 분석</div>
      <div class="analysis-text">${data.analysis||''}</div>
    </div>

    <div class="card">
      <div class="card-title">🐎 출전마 목록</div>
      <table class="horses-table">
        <tr><th>번호</th><th>마명</th><th>기수</th><th style="text-align:right">중량</th></tr>
        ${horsesHtml}
      </table>
    </div>`;
}

// ─── 전체 분석 결과 ───
function renderAllResults(results_list) {
  const cards = results_list.map(r => {
    if (r.status === 'error') {
      return `<div class="card"><div class="card-title">❌ ${r.meta?.venue} ${r.meta?.no}경주</div><div style="color:#791F1F;font-size:13px">${r.error}</div></div>`;
    }
    const d = r.data;
    const gp = d.grade_picks || {};
    const picks = ['A','B','C','D'].map(g => gp[g] ? `${gp[g].no}번 ${gp[g].name}` : '').filter(Boolean);
    const br = d.betting_recommend || {};
    const q = (br.quinella||[])[0] || '';
    const t = (br.trifecta||[])[0] || '';
    return `<div class="card" style="cursor:pointer" onclick="showDetail(${JSON.stringify(r.data).replace(/"/g,'&quot;')})">
      <div class="card-title">🏇 ${r.meta?.venue} ${r.meta?.no}경주 <span class="badge badge-blue">${r.meta?.distance}</span></div>
      <div style="font-size:12px;color:#666;margin-bottom:10px">${d.race_summary||''}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        ${picks.map((p,i)=>`<span class="tag ${['tag-b','tag-g','tag-a','tag-r'][i]}">${['A','B','C','D'][i]}: ${p}</span>`).join('')}
      </div>
      <div style="font-size:12px;color:#888">${q ? '복승: '+q : ''} ${t ? '| 삼복승: '+t : ''}</div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML =
    `<div style="margin-bottom:14px;font-size:14px;font-weight:500">⚡ 전체 분석 완료 — ${results_list.length}경주</div>${cards}`;
}

function showDetail(data) {
  const hdr = (data.race_data||{}).header||{};
  renderResult(data, hdr.venue||'', hdr.race_no||'');
}
</script>
</body>
</html>
