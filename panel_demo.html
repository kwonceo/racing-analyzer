<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<title>추천 패널 개편 데모 — 메인/BMED특별/전적배지</title>
<style>
  body{background:#0f172a;color:#e2e8f0;font:14px/1.5 -apple-system,'Malgun Gothic',sans-serif;padding:20px}
  .hint{color:#9fb3c8}
  h1{font-size:17px} h2{font-size:14px;color:#7dd3fc;margin:18px 0 4px}
  .row{display:flex;gap:20px;flex-wrap:wrap}
</style></head>
<body>
<h1>🎯 추천 패널 개편 데모 — 메인 ★★★ / BMED 특별 💎 / 전적 배지</h1>
<div class="hint">renderCorePicks 와 동일 구조(근거 문장·요약·특별 섹션·✅/⚠️ 전적 배지). 좌=전적 있음 / 우=전적 없음(경륜 유형).</div>
<div class="row"><div id="a" style="flex:1;min-width:340px"></div><div id="b" style="flex:1;min-width:340px"></div></div>
<script>
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function renderCorePicks(cp){
  const fq=cp.finalQuinellas||[], ft=cp.finalTrifectas||[], special=cp.bmedSpecial||[];
  const starStr=n=>'★'.repeat(Math.max(0,Math.min(3,n||0)));
  const nH=cp.raceHorseCount||0, maxQ=cp.quinellaMax||fq.length;
  const cntHead=nH?`<div class="hint" style="font-size:12px;margin-bottom:4px">${nH}두 경주 · 복승 ${fq.length}개 추천 <span style="opacity:.7">(상한 ${maxQ})</span></div>`:'';
  const formBadge=cp.formMissing
    ?`<div style="font-size:12.5px;font-weight:800;color:#fbbf24;margin-bottom:5px">⚠️ 전적 데이터 없음 — 배당 기반 분석 중</div>`
    :`<div style="font-size:12px;font-weight:700;color:#38d39f;margin-bottom:5px">✅ 전적+배당 분석</div>`;
  const basisBlock=(q,col)=>(q.basis&&q.basis.length)
    ?`<div style="margin:1px 0 4px 16px">${q.basis.map(b=>`<div class="hint" style="font-size:12.5px;color:${col}">→ ${esc(b)}</div>`).join('')}${q.summary?`<div class="hint" style="font-size:12px;color:#38d39f">→ ${esc(q.summary)}</div>`:''}</div>`:'';
  const qLines=fq.map(q=>{
    const oo=q.odds!=null?`<span class="hint" style="font-size:13px">(${q.odds}배)</span>`:'';
    const st=q.stars?` <span style="color:#fbbf24;font-size:14px">${starStr(q.stars)}</span>`:'';
    const rs=q.reason?` <span class="hint" style="font-size:12px">· ${esc(q.reason)}</span>`:'';
    return `<div style="font-size:19px;font-weight:800;margin:5px 0 0">복승: <span style="color:#4ea1ff">${q.combo.join('+')}</span> ${oo}${st}${rs}</div>${basisBlock(q,'#7dd3fc')}`;
  }).join('');
  const tLines=ft.slice(0,2).map(t=>`<div style="font-size:18px;font-weight:800;margin:5px 0">🛡 삼복승 보험: <span style="color:#c084fc">${t.combo.join('+')}</span> <span class="hint" style="font-size:13px">(${t.odds}배)</span> <span class="hint" style="font-size:12px">· ${esc(t.reason)}</span></div>`).join('');
  const spBlock=special.length?`<div style="margin-top:10px;padding:10px 12px;border:2px dashed #f0abfc;border-radius:10px;background:rgba(240,171,252,.08)">
    <div style="font-size:15px;font-weight:800;color:#f0abfc;margin-bottom:2px">💎 BMED 특별 감지 <span class="hint" style="font-weight:400;font-size:11px">시장은 저평가 · BMED만 감지한 고배당 기회</span></div>
    ${special.map(q=>{const oo=q.odds!=null?`<span class="hint" style="font-size:13px">(${q.odds}배)</span>`:'';const sc=q.score!=null?` <span class="hint" style="font-size:11px">· 신호 ${q.score}점</span>`:'';
      return `<div style="font-size:17px;font-weight:800;margin:4px 0 0">복승: <span style="color:#f0abfc">${q.combo.join('+')}</span> ${oo} <span style="color:#fbbf24;font-size:13px">★★</span>${sc}</div>${basisBlock(q,'#f0abfc')}`;}).join('')}
  </div>`:'';
  return `<div style="margin:6px 0;padding:14px;border:3px solid #38d39f;border-radius:12px;background:linear-gradient(180deg,rgba(56,211,159,.14),rgba(20,28,43,.92))">
    <div style="font-size:18px;font-weight:900;color:#38d39f;margin-bottom:4px">🎯 지금 사세요! <span class="hint" style="font-weight:400;font-size:11px">(근거 기반)</span></div>
    ${formBadge}${cntHead}${qLines}${tLines}${spBlock}</div>`;
}
// 좌: 경마 10두 · 전적 있음
document.getElementById('a').innerHTML='<h2>🐎 경마 10두 (전적 있음)</h2>'+renderCorePicks({
  raceHorseCount:10, quinellaMax:4, formMissing:false,
  finalQuinellas:[
    {combo:[2,5],odds:1.3,stars:3,reason:'시장 최저복승',basis:['2번: 급락 -23.0% 감지','5번: 스마트머니 유입'],summary:'시장+BMED 동시 유력'},
    {combo:[3,5],odds:6.4,stars:3,reason:'이중수렴(전적+배당)',basis:['5번: 스마트머니 유입'],summary:'시장+BMED 동시 유력'}],
  finalTrifectas:[{combo:[2,3,5],odds:12.5,reason:'삼복승 메인'}],
  bmedSpecial:[
    {combo:[3,7],odds:28.5,score:80,stars:2,basis:['7번: 역배열 감지'],summary:'시장 저평가 중 주목'},
    {combo:[1,3],odds:34.2,score:72,stars:2,basis:['1번: 급락 -18.0% 감지'],summary:'시장 저평가 중 주목'}]});
// 우: 경륜 7두 · 전적 없음
document.getElementById('b').innerHTML='<h2>🚴 경륜 7두 (전적 데이터 없음)</h2>'+renderCorePicks({
  raceHorseCount:7, quinellaMax:3, formMissing:true,
  finalQuinellas:[{combo:[4,5],odds:2.8,stars:3,reason:'시장 최저복승',basis:['4번: 급락 -23.0% 감지','5번: 스마트머니 유입'],summary:'시장+BMED 동시 유력'}],
  finalTrifectas:[{combo:[4,5,6],odds:9.7,reason:'삼복승 메인'}],
  bmedSpecial:[{combo:[3,7],odds:28.5,score:80,stars:2,basis:['3번: 급락 -16.0% 감지','7번: 역배열 감지'],summary:'시장 저평가 중 주목'}]});
</script>
</body></html>
